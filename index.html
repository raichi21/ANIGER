<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iLourSari - Inventory & Point of Sale System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="styles/main.css">
</head>
<body class="bg-gradient-modern">
    <div class="login-selection-container">
        <div class="selection-card">
            <div class="logo-section">
                <div class="logo-circle">
                    <i class="fas fa-store"></i>
                </div>
                <h1>iLourSari</h1>
                <p class="tagline">Lourdes Sari-Sari Store</p>
            </div>

            <div class="selection-content">
                <h2>Welcome to iLourSari</h2>
                <p class="subtitle">Select your account type to continue</p>

                <div class="selection-buttons">
                    <a href="admin-login.html" class="selection-btn admin-btn">
                        <div class="btn-icon">
                            <i class="fas fa-user-shield"></i>
                        </div>
                        <div class="btn-text">
                            <h3>Admin</h3>
                            <p>System Administration</p>
                        </div>
                        <i class="fas fa-arrow-right arrow-icon"></i>
                    </a>

                    <a href="staff-login.html" class="selection-btn staff-btn">
                        <div class="btn-icon">
                            <i class="fas fa-user-tie"></i>
                        </div>
                        <div class="btn-text">
                            <h3>Staff & Cashier</h3>
                            <p>Access POS and Inventory</p>
                        </div>
                        <i class="fas fa-arrow-right arrow-icon"></i>
                    </a>

                    <a href="customer-login.html" class="selection-btn customer-btn">
                        <div class="btn-icon">
                            <i class="fas fa-shopping-cart"></i>
                        </div>
                        <div class="btn-text">
                            <h3>Customer</h3>
                            <p>Browse & Purchase Items</p>
                        </div>
                        <i class="fas fa-arrow-right arrow-icon"></i>
                    </a>
                </div>
            </div>

            <footer class="selection-footer">
                <p>&copy; 2026 iLourSari. All rights reserved.</p>
            </footer>
        </div>
    </div>
</body>
</html>
